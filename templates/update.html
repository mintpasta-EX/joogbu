<html>
<head>
    <meta charset="UTF-8">
    <title>골드 던전 - 아이템 수정</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Malgun Gothic', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 500px; background-color: #1e1e1e; border: 2px solid #333; border-radius: 8px; padding: 20px; }
        h1 { color: #ffd700; border-bottom: 1px solid #ffd700; padding-bottom:10px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 8px; margin: 5px 0 15px 0; background:#121212; color:white; border:1px solid #444; }
        button, input[type="button"] { background-color: #333; color: white; border: 1px solid #555; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 48%; }
        input[type="button"]:hover { background-color: #ffd700; color: black; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ 글수정 (아이템 변경)</h1>
        <form method="post">
            제목:<input type="text" name="title" id="title" value="{{post[1]}}" readonly style="color:#888;"><br>
            작성자:<input type="text" name="author" id="author" value="{{post[3]}}" readonly style="color:#888;"><br>
            가격 (Gold):<input type="number" name="price" id="price" value="{{post[7]}}"><br>
            내용:<textarea name="content" id="content" style="height:100px;">{{post[2]}}</textarea><br>
            
            <div style="display:flex; justify-content:space-between;">
                <input type="button" value="저장" onclick="
                if(document.getElementById('title').value == ''
                || document.getElementById('content').value == ''
                || document.getElementById('author').value == ''
                || document.getElementById('price').value == ''){
                    alert('모든 항목을 입력해주시오');
                } else {
                    document.querySelector('form').submit();
                }">
                <input type="button" value="취소" onclick="location.href='/detail/{{id}}/'">
            </div>
        </form>
    </div>
</body>
</html>
